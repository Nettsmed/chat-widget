name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  tag-guard:
    # A bad tag poisons every consuming bot (they pin github:#vX.Y.Z).
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: package.json version must match the tag + have a CHANGELOG heading
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG != package.json $PKG"; exit 1
          fi
          if ! grep -q "## \[$PKG\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md missing heading for $PKG"; exit 1
          fi
          echo "tag v$TAG matches package.json + CHANGELOG ✓"
